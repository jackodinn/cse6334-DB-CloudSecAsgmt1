<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
  </head>
  <body>
    <div class="auth-card">
      <h1 class="title">Reset Password</h1>
      <p class="subtitle">Enter your email to receive a reset link</p>

      <form method="POST">
        {{ form.hidden_tag() }}
        <div class="form-group">
          {{ form.email.label }}
          {{ form.email(class='form-control', placeholder='Enter your registered email') }}
          {% for error in form.email.errors %}
            <small style="color:red">{{ error }}</small>
          {% endfor %}
        </div>
        <button type="submit" class="btn-auth">{{ form.submit.label }}</button>
      </form>

      <div class="auth-footer" style="justify-content: center;">
        <a href="{{ url_for('login') }}">Back to Log In</a>
      </div>
    </div>
  </body>
</html>
